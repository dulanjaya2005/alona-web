version: '3.9'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: alona_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alona_web
      MYSQL_USER: alona
      MYSQL_PASSWORD: alonapassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alona_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: alona
      DB_PASSWORD: alonapassword
      DB_NAME: alona_web
      JWT_SECRET: change_this_to_a_secure_random_string_in_production
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alona_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mysql_data:
